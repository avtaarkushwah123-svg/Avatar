<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJ Fashion India</title>
<style>
body{font-family:Arial, sans-serif;margin:0;background:#f1f3f6}

/* Header */
.topbar{background:#2874f0;color:white;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:22px;font-weight:bold}
.search-box input{padding:8px;width:300px;border:none;border-radius:3px}
.cart{font-weight:bold}

/* Categories */
.categories{display:flex;gap:20px;background:white;padding:10px 20px;overflow:auto}
.categories div{cursor:pointer;font-weight:bold}

/* Product grid */
.container{max-width:1200px;margin:auto;padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:white;border-radius:6px;padding:15px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.card img{width:100%;height:260px;object-fit:cover}
.price{font-size:18px;font-weight:bold;color:#111}
.oldprice{text-decoration:line-through;color:gray;font-size:14px}
button{background:#fb641b;color:white;border:none;padding:10px 15px;border-radius:4px;margin-top:8px;cursor:pointer}
button:hover{opacity:0.9}

/* Cart Panel */
#cartPanel{position:fixed;right:0;top:0;width:300px;height:100%;background:white;border-left:1px solid #ccc;padding:20px;display:none;overflow:auto}
#cartPanel h2{text-align:center}

footer{background:#172337;color:white;text-align:center;padding:15px;margin-top:40px}
</style>
</head>
<body>

<div class="topbar">
<div class="logo">BJ Fashion</div>
<div class="search-box">
<input type="text" placeholder="Search for products...">
</div>
<div class="cart" onclick="toggleCart()">🛒 Cart (<span id="cartCount">0</span>)</div>
</div>

<div class="categories">
<div>Men</div>
<div>Women</div>
<div>Kids</div>
<div>T-Shirts</div>
<div>Jeans</div>
<div>Jackets</div>
</div>

<div class="container">

<div class="products" id="productList">

<div class="card">
<img src="https://via.placeholder.com/300x350">
<h3>Men Casual T‑Shirt</h3>
<div class="oldprice">₹799</div>
<div class="price">₹499</div>
<button onclick="addToCart('Men Casual T‑Shirt',499)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x350">
<h3>Blue Denim Jeans</h3>
<div class="oldprice">₹1799</div>
<div class="price">₹1299</div>
<button onclick="addToCart('Blue Denim Jeans',1299)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x350">
<h3>Winter Jacket</h3>
<div class="oldprice">₹2499</div>
<div class="price">₹1999</div>
<button onclick="addToCart('Winter Jacket',1999)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x350">
<h3>Stylish Hoodie</h3>
<div class="oldprice">₹1499</div>
<div class="price">₹999</div>
<button onclick="addToCart('Stylish Hoodie',999)">Add to Cart</button>
</div>

</div>
</div>

<div id="cartPanel">
<h2>Your Cart</h2>
<ul id="cartItems"></ul>
<h3>Total: ₹<span id="totalPrice">0</span></h3>
<button onclick="checkout()">Checkout</button>
</div>

<footer>
<p>© 2026 BJ Fashion India</p>
<p>Contact: avtaarkushwah123@gmail.com | +91-8266032833</p>
</footer>

<script>
let cart=[]
let total=0

function addToCart(name,price){
cart.push({name,price})
total+=price
updateCart()
}

function updateCart(){
const cartItems=document.getElementById('cartItems')
cartItems.innerHTML=''
cart.forEach(item=>{
const li=document.createElement('li')
li.textContent=item.name+' - ₹'+item.price
cartItems.appendChild(li)
})

document.getElementById('cartCount').textContent=cart.length

document.getElementById('totalPrice').textContent=total
}

function toggleCart(){
const panel=document.getElementById('cartPanel')
panel.style.display=panel.style.display==='block'?'none':'block'
}

function checkout(){
alert('Order placed! We will contact you soon.')
cart=[]
total=0
updateCart()
}
</script>

</body>
</html>
